---
apiVersion: v1
kind: Secret
metadata:
  name: oauth2-proxy-secret
  namespace: kubernaut-system
  labels:
    app.kubernetes.io/name: oauth2-proxy
    app.kubernetes.io/component: auth
    app.kubernetes.io/part-of: kubernaut
type: Opaque
stringData:
  client-id: kubernaut-apifrontend
  client-secret: e2e-client-secret
  cookie-secret: "a2JybmF1dC1kZW1vLWNvbnNvbGUtc2VjcmV0" # pre-commit:allow-sensitive (dummy dev value)
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: console-nginx-config
  namespace: kubernaut-system
  labels:
    app.kubernetes.io/name: kubernaut-console
data:
  default.conf: |
    server {
      listen 8080;
      root /usr/share/nginx/html;
      index index.html;

      # Reverse proxy A2A API requests to the API Frontend service.
      # The OAuth2 Proxy has already injected the Authorization header.
      location /a2a/ {
        proxy_pass http://apifrontend-service.kubernaut-system.svc:8443;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        # SSE: disable buffering so events stream immediately
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 300s;
      }

      location /.well-known/ {
        proxy_pass http://apifrontend-service.kubernaut-system.svc:8443;
        proxy_http_version 1.1;
      }

      # Serve Console SPA static files; fallback to index.html for client-side routing
      location / {
        try_files $uri $uri/ /index.html;
      }
    }
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: kubernaut-console
  namespace: kubernaut-system
  labels:
    app.kubernetes.io/name: kubernaut-console
    app.kubernetes.io/component: frontend
    app.kubernetes.io/part-of: kubernaut
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: kubernaut-console
  template:
    metadata:
      labels:
        app.kubernetes.io/name: kubernaut-console
        app.kubernetes.io/component: frontend
        app.kubernetes.io/part-of: kubernaut
    spec:
      securityContext:
        runAsNonRoot: true
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: oauth2-proxy
          image: quay.io/oauth2-proxy/oauth2-proxy:v7.9.0
          args:
            - --provider=oidc
            - --oidc-issuer-url=http://dex.kubernaut-system.svc:5556/dex
            - --redirect-url=http://localhost:4180/oauth2/callback
            - --http-address=0.0.0.0:4180
            - --upstream=http://localhost:8080
            - --pass-authorization-header=true
            - --skip-provider-button=true
            - --cookie-name=_kubernaut_console
            - --cookie-secure=false
            - --cookie-samesite=lax
            - --email-domain=*
            - --scope=openid email profile groups
            - --skip-jwt-bearer-tokens=true
          env:
            - name: OAUTH2_PROXY_CLIENT_ID
              valueFrom:
                secretKeyRef:
                  name: oauth2-proxy-secret
                  key: client-id
            - name: OAUTH2_PROXY_CLIENT_SECRET
              valueFrom:
                secretKeyRef:
                  name: oauth2-proxy-secret
                  key: client-secret
            - name: OAUTH2_PROXY_COOKIE_SECRET
              valueFrom:
                secretKeyRef:
                  name: oauth2-proxy-secret
                  key: cookie-secret
          ports:
            - name: http
              containerPort: 4180
              protocol: TCP
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
            readOnlyRootFilesystem: true
            runAsUser: 65534
          readinessProbe:
            httpGet:
              path: /oauth2/ping
              port: 4180
            initialDelaySeconds: 3
            periodSeconds: 5
          resources:
            requests:
              cpu: 25m
              memory: 32Mi
            limits:
              cpu: 100m
              memory: 128Mi

        - name: nginx
          image: nginx:1-alpine
          ports:
            - name: static
              containerPort: 8080
              protocol: TCP
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
            runAsUser: 101
          resources:
            requests:
              cpu: 10m
              memory: 16Mi
            limits:
              cpu: 50m
              memory: 64Mi
          volumeMounts:
            - name: console-html
              mountPath: /usr/share/nginx/html
              readOnly: true
            - name: nginx-config
              mountPath: /etc/nginx/conf.d
              readOnly: true
            - name: nginx-tmp
              mountPath: /tmp
            - name: nginx-cache
              mountPath: /var/cache/nginx
            - name: nginx-run
              mountPath: /var/run
      volumes:
        - name: console-html
          emptyDir: {}
        - name: nginx-config
          configMap:
            name: console-nginx-config
        - name: nginx-tmp
          emptyDir: {}
        - name: nginx-cache
          emptyDir: {}
        - name: nginx-run
          emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: kubernaut-console
  namespace: kubernaut-system
  labels:
    app.kubernetes.io/name: kubernaut-console
    app.kubernetes.io/component: frontend
    app.kubernetes.io/part-of: kubernaut
spec:
  type: NodePort
  selector:
    app.kubernetes.io/name: kubernaut-console
  ports:
    - name: http
      port: 4180
      targetPort: 4180
      nodePort: 30418
      protocol: TCP
