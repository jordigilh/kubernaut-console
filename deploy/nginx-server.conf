# Server-level directives (included inside server {} block)

# Security headers
add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; img-src 'self' data:; connect-src 'self'; font-src 'self' https://fonts.gstatic.com; frame-ancestors 'none'; base-uri 'self'; form-action 'self'" always;
add_header X-Content-Type-Options "nosniff" always;
add_header X-Frame-Options "DENY" always;
add_header Referrer-Policy "strict-origin-when-cross-origin" always;
add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;
add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

# Health check endpoint
location = /healthz {
    access_log off;
    return 200 "ok";
    add_header Content-Type text/plain;
}

# Static assets with long-lived cache
location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff2?|ttf|eot)$ {
    expires 1y;
    add_header Cache-Control "public, immutable";
    try_files $uri =404;
}

# SPA fallback
location / {
    add_header Cache-Control "no-cache, must-revalidate";
    try_files $uri $uri/ /index.html;
}

# A2A SSE proxy
location /a2a/ {
    limit_req zone=api burst=50 nodelay;
    proxy_pass http://apifrontend.kubernaut-system.svc:8443;
    proxy_http_version 1.1;
    proxy_set_header Connection "";
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header Authorization "Bearer $http_x_forwarded_access_token";
    proxy_buffering off;
    proxy_cache off;
    proxy_read_timeout 3600s;
    proxy_send_timeout 3600s;
    send_timeout 3600s;
    keepalive_timeout 3600s;
}

# MCP JSON-RPC proxy
location = /mcp {
    limit_req zone=mcp burst=20 nodelay;
    proxy_pass http://apifrontend.kubernaut-system.svc:8443;
    proxy_http_version 1.1;
    proxy_set_header Connection "";
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header Authorization "Bearer $http_x_forwarded_access_token";
    proxy_read_timeout 30s;
}

# Well-known discovery
location /.well-known/ {
    proxy_pass http://apifrontend.kubernaut-system.svc:8443;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
}
