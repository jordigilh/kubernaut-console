apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "kubernaut-console.fullname" . }}-nginx
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "kubernaut-console.labels" . | nindent 4 }}
data:
  http.conf: |
    limit_req_zone $binary_remote_addr zone=api:10m rate=30r/s;
    limit_req_zone $binary_remote_addr zone=mcp:10m rate=10r/s;

    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml text/javascript image/svg+xml;
    gzip_min_length 256;
    gzip_vary on;
  server.conf: |
    add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; img-src 'self' data:; connect-src 'self'; font-src 'self' https://fonts.gstatic.com; frame-ancestors 'none'; base-uri 'self'; form-action 'self'" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    location /a2a/ {
      limit_req zone=api burst=50 nodelay;
      proxy_pass {{ .Values.apiFrontend.url }};
      proxy_http_version 1.1;
      proxy_set_header Connection "";
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header Authorization "Bearer $http_x_forwarded_access_token";
      proxy_buffering off;
      proxy_cache off;
      proxy_read_timeout 3600s;
      proxy_send_timeout 3600s;
      send_timeout 3600s;
      keepalive_timeout 3600s;
    }

    location = /mcp {
      limit_req zone=mcp burst=20 nodelay;
      proxy_pass {{ .Values.apiFrontend.url }};
      proxy_http_version 1.1;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header Authorization "Bearer $http_x_forwarded_access_token";
      proxy_read_timeout 30s;
    }

    location /.well-known/ {
      proxy_pass {{ .Values.apiFrontend.url }};
      proxy_http_version 1.1;
      proxy_set_header Host $host;
    }

    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff2?|ttf|eot)$ {
      expires 1y;
      add_header Cache-Control "public, immutable";
      try_files $uri =404;
    }

    location / {
      add_header Cache-Control "no-cache, must-revalidate";
      try_files $uri $uri/ /index.html;
    }
