replicaCount: 1

image:
  repository: ghcr.io/jordigilh/kubernaut-console
  tag: "latest"
  # digest overrides tag when set (use for immutable pinning)
  digest: ""
  pullPolicy: Always

# Agent discovery — how Console finds AF
apiFrontend:
  url: "http://apifrontend.kubernaut-system.svc:8443"

# OIDC / OAuth2 Proxy configuration
auth:
  provider: oidc
  issuerUrl: ""
  clientId: ""
  skipTlsVerify: false
  # Reference to a pre-existing Secret containing OIDC credentials
  # The Secret must have keys: client-id, client-secret, cookie-secret
  existingSecret: "" # pre-commit:allow-sensitive (Secret name, not a value)
  redirectUrl: ""

# Ingress / exposure
service:
  type: ClusterIP
  port: 4180

# OCP Route (auto-rendered when OpenShift detected via .Capabilities.APIVersions)
route:
  enabled: true
  host: ""
  tls:
    termination: edge

# Security context
securityContext:
  runAsNonRoot: true
  seccompProfile:
    type: RuntimeDefault

# Resources
resources:
  oauth2Proxy:
    requests:
      cpu: 25m
      memory: 32Mi
    limits:
      cpu: 100m
      memory: 128Mi
  nginx:
    requests:
      cpu: 10m
      memory: 16Mi
    limits:
      cpu: 50m
      memory: 64Mi
