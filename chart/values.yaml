replicaCount: 1

image:
  repository: ghcr.io/jordigilh/kubernaut-demo-console
  tag: "6ea78f2"
  # digest overrides tag when set (use for immutable pinning)
  # digest: "sha256:6809a281cc9dda9016152b818bf06f3ae664b17e40dab892fa70ed12e77e78bc"
  pullPolicy: IfNotPresent

# Agent discovery — how Console finds AF
apiFrontend:
  url: "http://apifrontend.kubernaut-system.svc:8443"

# OIDC / OAuth2 Proxy configuration
auth:
  provider: oidc
  issuerUrl: "https://keycloak-keycloak.apps.dev.redhat-internal.com/realms/kagenti"
  clientId: "kubernaut-console"
  # Reference to a pre-existing Secret containing OIDC credentials
  # The Secret must have keys: client-id, client-secret, cookie-secret
  existingSecret: "kubernaut-console-oidc" # pre-commit:allow-sensitive (Secret name, not a value)
  redirectUrl: ""  # Auto-derived from service if empty

# Ingress / exposure
service:
  type: ClusterIP
  port: 4180

# OCP Route (auto-rendered when OpenShift detected via .Capabilities.APIVersions)
route:
  enabled: true
  host: ""
  tls:
    termination: edge

# Security context
securityContext:
  runAsNonRoot: true
  seccompProfile:
    type: RuntimeDefault

# Resources
resources:
  oauth2Proxy:
    requests:
      cpu: 25m
      memory: 32Mi
    limits:
      cpu: 100m
      memory: 128Mi
  nginx:
    requests:
      cpu: 10m
      memory: 16Mi
    limits:
      cpu: 50m
      memory: 64Mi
