name: CI
on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Build all packages
        run: pnpm build

      - name: Run tests
        run: pnpm test

      - name: Verify ui-core output
        run: |
          test -f packages/ui-core/dist/index.js
          test -f packages/ui-core/dist/index.d.ts

      - name: Verify plugin-backstage output
        run: |
          test -f packages/plugin-backstage/dist/remoteEntry.js
          test -f packages/plugin-backstage/dist/mf-manifest.json

      - name: Bundle dynamic plugin
        run: pnpm --filter @kubernaut/plugin-backstage bundle

      - name: Verify bundle
        run: |
          test -f packages/plugin-backstage/dist-dynamic/package.json
          test -f packages/plugin-backstage/dist-dynamic/dist/remoteEntry.js

      - name: Verify plugin-ocm output
        run: |
          test -f packages/plugin-ocm/dist/plugin-manifest.json
          test -f packages/plugin-ocm/dist/plugin-entry.js

  security-scan:
    runs-on: ubuntu-latest
    permissions:
      security-events: write
    steps:
      - uses: actions/checkout@v4

      - name: Run Trivy filesystem scan
        uses: aquasecurity/trivy-action@0.28.0
        with:
          scan-type: fs
          scan-ref: .
          format: sarif
          output: trivy-fs.sarif
          severity: CRITICAL,HIGH

      - name: Upload Trivy SARIF
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: trivy-fs.sarif
        if: always()
