apiVersion: apps/v1
kind: Deployment
metadata:
  name: kubernaut-console
  labels:
    app.kubernetes.io/name: kubernaut-console
    app.kubernetes.io/component: frontend
    app.kubernetes.io/part-of: kubernaut
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: kubernaut-console
  template:
    metadata:
      labels:
        app.kubernetes.io/name: kubernaut-console
        app.kubernetes.io/component: frontend
        app.kubernetes.io/part-of: kubernaut
    spec:
      containers:
        - name: console
          image: quay.io/kubernaut-cicd/kubernaut-standalone:latest
          ports:
            - name: http
              containerPort: 8080
              protocol: TCP
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 3
            periodSeconds: 5
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 200m
              memory: 128Mi
          securityContext:
            allowPrivilegeEscalation: false
            runAsNonRoot: true
            seccompProfile:
              type: RuntimeDefault
            capabilities:
              drop: ["ALL"]
