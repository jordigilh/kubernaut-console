<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 900" font-family="-apple-system, BlinkMacSystemFont, Segoe UI, sans-serif">
  <!-- Background -->
  <rect width="800" height="900" fill="#0f172a"/>
  
  <!-- Container card -->
  <rect x="40" y="20" width="720" height="860" rx="12" fill="#1e293b" stroke="#334155" stroke-width="1"/>
  
  <!-- Header -->
  <rect x="40" y="20" width="720" height="56" rx="12" fill="#1e293b"/>
  <rect x="40" y="64" width="720" height="1" fill="#334155"/>
  <!-- Kubernaut logo -->
  <circle cx="72" cy="48" r="14" fill="#3b82f6"/>
  <text x="72" y="53" text-anchor="middle" fill="white" font-size="12" font-weight="bold">K</text>
  <text x="96" y="53" fill="#f1f5f9" font-size="15" font-weight="600">Kubernaut Console</text>
  <!-- Connection status -->
  <circle cx="680" cy="48" r="5" fill="#22c55e"/>
  <text x="694" y="52" fill="#94a3b8" font-size="11">Connected</text>
  <!-- New chat button -->
  <rect x="580" y="34" width="80" height="28" rx="6" fill="#334155"/>
  <text x="620" y="52" text-anchor="middle" fill="#94a3b8" font-size="11">+ New Chat</text>

  <!-- Alert Banner -->
  <rect x="56" y="76" width="688" height="44" rx="8" fill="#7f1d1d" stroke="#dc2626" stroke-width="1"/>
  <circle cx="78" cy="98" r="8" fill="#dc2626"/>
  <text x="78" y="102" text-anchor="middle" fill="white" font-size="10" font-weight="bold">!</text>
  <text x="94" y="95" fill="#fecaca" font-size="12" font-weight="600">Critical Alert</text>
  <text x="94" y="110" fill="#fca5a5" font-size="11">CrashLoopBackOff: payments-service-7b4d9f (3 pods affected)</text>

  <!-- Chat Messages Area -->
  <!-- User message -->
  <rect x="300" y="140" width="428" height="42" rx="12" fill="#3b82f6"/>
  <text x="316" y="164" fill="white" font-size="13">What's happening with the payments pods?</text>
  <text x="660" y="176" fill="#93c5fd" font-size="9">8:14 PM</text>

  <!-- Agent response -->
  <!-- Thinking panel (collapsed) -->
  <rect x="56" y="200" width="400" height="36" rx="8" fill="#1a2332" stroke="#334155" stroke-width="1"/>
  <!-- Triangle arrow for collapsed state -->
  <polygon points="76,216 86,222 76,228" fill="#64748b"/>
  <text x="94" y="222" fill="#64748b" font-size="11" font-style="italic">Thinking... (investigating pod status, checking events)</text>
  <text x="420" y="222" fill="#475569" font-size="10">2.3s</text>

  <!-- Agent markdown response -->
  <rect x="56" y="248" width="520" height="130" rx="12" fill="#1a2332"/>
  <text x="72" y="272" fill="#e2e8f0" font-size="13" font-weight="600">Investigation Complete</text>
  <text x="72" y="296" fill="#cbd5e1" font-size="12">The payments-service pods are in a CrashLoopBackOff state</text>
  <text x="72" y="314" fill="#cbd5e1" font-size="12">due to a configuration error introduced in release v2.4.1.</text>
  <line x1="72" y1="330" x2="560" y2="330" stroke="#334155" stroke-width="1"/>
  <text x="72" y="350" fill="#94a3b8" font-size="11" font-weight="600">Root Cause:</text>
  <text x="84" y="368" fill="#cbd5e1" font-size="11">DATABASE_URL env var references non-existent secret</text>
  <text x="660" y="372" fill="#475569" font-size="9">8:14 PM</text>

  <!-- Workflow Cards -->
  <text x="56" y="410" fill="#94a3b8" font-size="11" font-weight="600" letter-spacing="0.5">RECOMMENDED ACTIONS</text>
  
  <!-- Card 1 (Recommended) -->
  <rect x="56" y="422" width="330" height="100" rx="10" fill="#1a2332" stroke="#3b82f6" stroke-width="2"/>
  <!-- Recommended badge -->
  <rect x="66" y="432" width="90" height="20" rx="10" fill="#1e3a5f"/>
  <text x="111" y="446" text-anchor="middle" fill="#60a5fa" font-size="9" font-weight="600">RECOMMENDED</text>
  <text x="72" y="472" fill="#e2e8f0" font-size="13" font-weight="600">Rollback to v2.3.9</text>
  <text x="72" y="492" fill="#94a3b8" font-size="11">Revert deployment to last known-good</text>
  <text x="72" y="507" fill="#94a3b8" font-size="11">release. ETA: ~30 seconds.</text>
  <!-- Arrow icon -->
  <circle cx="360" cy="472" r="14" fill="#334155"/>
  <path d="M354,472 L366,472 M362,468 L366,472 L362,476" stroke="#60a5fa" stroke-width="2" fill="none"/>

  <!-- Card 2 -->
  <rect x="400" y="422" width="330" height="100" rx="10" fill="#1a2332" stroke="#334155" stroke-width="1"/>
  <text x="416" y="452" fill="#e2e8f0" font-size="13" font-weight="600">Fix Secret Reference</text>
  <text x="416" y="472" fill="#94a3b8" font-size="11">Patch the deployment to reference the</text>
  <text x="416" y="487" fill="#94a3b8" font-size="11">correct secret name. ETA: ~45 seconds.</text>
  <!-- Arrow icon -->
  <circle cx="704" cy="472" r="14" fill="#334155"/>
  <path d="M698,472 L710,472 M706,468 L710,472 L706,476" stroke="#64748b" stroke-width="2" fill="none"/>

  <!-- Card 3 -->
  <rect x="56" y="534" width="330" height="100" rx="10" fill="#1a2332" stroke="#334155" stroke-width="1"/>
  <text x="72" y="564" fill="#e2e8f0" font-size="13" font-weight="600">Scale Down and Investigate</text>
  <text x="72" y="584" fill="#94a3b8" font-size="11">Scale replicas to 0, preserve logs for</text>
  <text x="72" y="599" fill="#94a3b8" font-size="11">manual analysis. Non-destructive.</text>
  <circle cx="360" cy="564" r="14" fill="#334155"/>
  <path d="M354,564 L366,564 M362,560 L366,564 L362,568" stroke="#64748b" stroke-width="2" fill="none"/>

  <!-- Execution Progress (showing what happens after selecting rollback) -->
  <rect x="56" y="654" width="520" height="120" rx="10" fill="#1a2332" stroke="#334155" stroke-width="1"/>
  <text x="72" y="678" fill="#94a3b8" font-size="10" font-weight="600" letter-spacing="0.5">EXECUTION PROGRESS</text>
  <!-- Step 1 complete -->
  <circle cx="80" cy="700" r="7" fill="#22c55e"/>
  <path d="M76,700 L79,703 L84,697" stroke="white" stroke-width="1.5" fill="none"/>
  <text x="96" y="704" fill="#cbd5e1" font-size="11">Scaling down payments-service replicas</text>
  <!-- Step 2 complete -->
  <circle cx="80" cy="722" r="7" fill="#22c55e"/>
  <path d="M76,722 L79,725 L84,719" stroke="white" stroke-width="1.5" fill="none"/>
  <text x="96" y="726" fill="#cbd5e1" font-size="11">Applying rollback to v2.3.9</text>
  <!-- Step 3 in progress -->
  <circle cx="80" cy="744" r="7" fill="none" stroke="#3b82f6" stroke-width="2"/>
  <circle cx="80" cy="744" r="3" fill="#3b82f6"/>
  <text x="96" y="748" fill="#e2e8f0" font-size="11">Waiting for rollout to complete...</text>
  <!-- Step 4 pending -->
  <circle cx="80" cy="766" r="7" fill="none" stroke="#475569" stroke-width="1"/>
  <text x="96" y="770" fill="#64748b" font-size="11">Verify pod health checks</text>

  <!-- Input Area -->
  <rect x="56" y="800" width="688" height="48" rx="24" fill="#0f172a" stroke="#334155" stroke-width="1"/>
  <text x="82" y="828" fill="#64748b" font-size="13">Ask about an incident or select an action...</text>
  <!-- Send button -->
  <circle cx="716" cy="824" r="18" fill="#3b82f6"/>
  <path d="M716,816 L716,832 M710,822 L716,816 L722,822" stroke="white" stroke-width="2" fill="none"/>

  <!-- Footer -->
  <text x="400" y="870" text-anchor="middle" fill="#475569" font-size="10">Sign out  |  Powered by Kubernaut A2A</text>
</svg>
