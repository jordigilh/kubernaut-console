<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 820 950" font-family="Red Hat Text, Red Hat Display, -apple-system, sans-serif">
  <defs>
    <filter id="cardShadow">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#000" flood-opacity="0.06"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="820" height="950" fill="#F9FAFB"/>
  
  <!-- Container -->
  <rect x="30" y="16" width="760" height="920" rx="16" fill="white" stroke="#EBEBEB" stroke-width="1" filter="url(#cardShadow)"/>

  <!-- ===== HEADER ===== -->
  <rect x="30" y="16" width="760" height="56" rx="16" fill="#0097A7"/>
  <rect x="30" y="56" width="760" height="16" fill="#0097A7"/>
  <circle cx="62" cy="44" r="14" fill="rgba(255,255,255,0.2)"/>
  <text x="62" y="49" text-anchor="middle" fill="white" font-size="12" font-weight="700">K</text>
  <text x="86" y="48" fill="white" font-size="14" font-weight="600" font-family="Red Hat Display, sans-serif">Kubernaut Console</text>
  <rect x="556" y="32" width="130" height="24" rx="12" fill="rgba(255,255,255,0.15)"/>
  <circle cx="572" cy="44" r="4" fill="#4ade80"/>
  <text x="584" y="48" fill="rgba(255,255,255,0.9)" font-size="11" font-weight="500">Decision pending</text>
  <text x="700" y="48" fill="rgba(255,255,255,0.7)" font-size="11">+ New</text>
  <circle cx="752" cy="44" r="12" fill="rgba(255,255,255,0.2)"/>
  <text x="752" y="48" text-anchor="middle" fill="white" font-size="11" font-weight="600">JG</text>

  <!-- ===== ALERT BANNER ===== -->
  <rect x="46" y="82" width="728" height="44" rx="8" fill="#FEF2F2" stroke="#FECACA" stroke-width="1"/>
  <circle cx="68" cy="104" r="8" fill="#EE0000"/>
  <text x="68" y="108" text-anchor="middle" fill="white" font-size="9" font-weight="700">!</text>
  <text x="84" y="100" fill="#7F1D1D" font-size="12" font-weight="600">KubePodCrashLooping</text>
  <text x="248" y="100" fill="#6A6E73" font-size="11">[critical]</text>
  <text x="84" y="116" fill="#991B1B" font-size="11">web-frontend-c8dc85956-qm7hq in demo-webui (4 restarts, CrashLoopBackOff)</text>

  <!-- ===== USER MESSAGE ===== -->
  <rect x="346" y="140" width="428" height="36" rx="16" fill="#E0F2FE"/>
  <text x="362" y="162" fill="#0C4A6E" font-size="12">What's crashing in demo-webui?</text>

  <!-- ===== THINKING PANEL ===== -->
  <rect x="46" y="190" width="728" height="24" rx="6" fill="white"/>
  <polygon points="56,199 62,203 56,207" fill="#0097A7" transform="rotate(90,59,203)"/>
  <text x="70" y="206" fill="#6A6E73" font-size="11" font-weight="500">Investigating</text>
  <circle cx="142" cy="203" r="2" fill="#0097A7" opacity="0.4"/>
  <circle cx="149" cy="203" r="2" fill="#0097A7" opacity="0.7"/>
  <circle cx="156" cy="203" r="2" fill="#0097A7" opacity="1"/>
  <text x="668" y="206" fill="#A3A6A9" font-size="11">2m 31s</text>

  <rect x="46" y="216" width="728" height="150" rx="8" fill="#F9FAFB" stroke="#EBEBEB" stroke-width="1"/>
  <text x="62" y="236" fill="#6A6E73" font-size="11" font-style="italic">Analyzing...</text>
  <text x="62" y="252" fill="#6A6E73" font-size="11">Checking for existing active remediation...</text>
  <text x="62" y="268" fill="#6A6E73" font-size="11">No active remediation exists. Launching fresh investigation.</text>
  <text x="62" y="290" fill="#A3A6A9" font-size="11">kubectl_previous_logs Pod/web-frontend-c8dc85956-qm7hq</text>
  <text x="62" y="306" fill="#A3A6A9" font-size="11">kubectl_describe Pod/web-frontend-c8dc85956-qm7hq</text>
  <text x="62" y="322" fill="#A3A6A9" font-size="11">kubectl_events Pod/web-frontend-c8dc85956-qm7hq</text>
  <text x="62" y="338" fill="#6A6E73" font-size="11" font-style="italic">Container failing due to invalid config file. Investigating ConfigMap...</text>
  <text x="62" y="356" fill="#A3A6A9" font-size="11">kubectl_get_by_name ConfigMap/app-config -n demo-webui</text>
  <rect x="764" y="220" width="4" height="142" rx="2" fill="#EBEBEB"/>
  <rect x="764" y="310" width="4" height="44" rx="2" fill="#D1D5DB"/>

  <!-- ===== RCA CARD ===== -->
  <rect x="46" y="380" width="728" height="190" rx="12" fill="white" stroke="#EBEBEB" stroke-width="1" filter="url(#cardShadow)"/>
  <rect x="46" y="388" width="4" height="174" fill="#EE0000"/>
  <text x="66" y="406" fill="#151515" font-size="14" font-weight="700" font-family="Red Hat Display, sans-serif">Root Cause Analysis</text>
  <rect x="222" y="394" width="52" height="18" rx="9" fill="#FEF2F2"/>
  <text x="248" y="406" text-anchor="middle" fill="#EE0000" font-size="9" font-weight="600">critical</text>
  <!-- Summary -->
  <text x="66" y="430" fill="#292929" font-size="12">ConfigMap app-config contains an invalid directive introduced by Git commit caa704e8, synced by ArgoCD.</text>
  <text x="66" y="448" fill="#292929" font-size="12">With selfHeal:true, in-cluster patches are futile -- the fix must be applied at the Git source via a revert.</text>
  <text x="66" y="470" fill="#6A6E73" font-size="11">Target: ConfigMap/app-config in demo-webui | Confidence: 0.95 | 19 tool calls, 17 LLM turns</text>
  <line x1="66" y1="484" x2="748" y2="484" stroke="#EBEBEB" stroke-width="1"/>
  <!-- Causal chain (scroll) -->
  <text x="66" y="502" fill="#6A6E73" font-size="11" font-weight="500">Causal chain:</text>
  <text x="66" y="520" fill="#6A6E73" font-size="11">Signal:</text>
  <text x="114" y="520" fill="#292929" font-size="11">Pod web-frontend in CrashLoopBackOff (4 restarts, exit code 1)</text>
  <text x="66" y="538" fill="#6A6E73" font-size="11">Why?</text>
  <text x="114" y="538" fill="#292929" font-size="11">[emerg] invalid directive found in /etc/demo-http-server/config.yaml</text>
  <text x="66" y="556" fill="#6A6E73" font-size="11">Why?</text>
  <text x="114" y="556" fill="#292929" font-size="11">ConfigMap app-config contains 'invalid_directive: true'</text>
  <rect x="764" y="388" width="4" height="174" rx="2" fill="#EBEBEB"/>
  <rect x="764" y="470" width="4" height="50" rx="2" fill="#D1D5DB"/>

  <!-- ===== AGENT TEXT CTA ===== -->
  <rect x="46" y="584" width="728" height="48" rx="8" fill="#F0FDFA"/>
  <text x="62" y="604" fill="#0097A7" font-size="12" font-weight="500">In-cluster patches won't persist -- ArgoCD selfHeal will revert them. I recommend a Git revert.</text>
  <text x="62" y="622" fill="#0097A7" font-size="12" font-weight="500">Select a workflow, or tell me if you'd like to investigate further.</text>

  <!-- ===== WORKFLOW CARD 1: EXPANDED with inline countdown ===== -->
  <rect x="46" y="646" width="728" height="168" rx="12" fill="white" stroke="#0097A7" stroke-width="2" filter="url(#cardShadow)"/>
  <circle cx="66" cy="670" r="8" fill="#16A34A"/>
  <path d="M63,670 L65,672 L69,668" stroke="white" stroke-width="1.5" fill="none"/>
  <text x="80" y="674" fill="#151515" font-size="12" font-weight="700">git-revert-v2</text>
  <rect x="196" y="662" width="80" height="18" rx="9" fill="#F0FDFA" stroke="#0097A7" stroke-width="0.5"/>
  <text x="236" y="675" text-anchor="middle" fill="#0097A7" font-size="9" font-weight="600">Recommended</text>
  <text x="66" y="696" fill="#292929" font-size="11">Reverts the most recent commit in a GitOps-managed repository to undo a bad change.</text>
  <text x="66" y="712" fill="#292929" font-size="11">ArgoCD will automatically reconcile the reverted healthy state.</text>
  <!-- Expanded: parameters -->
  <rect x="66" y="724" width="690" height="34" rx="4" fill="#F9FAFB"/>
  <text x="78" y="738" fill="#6A6E73" font-size="11" font-family="monospace">TARGET_RESOURCE_NAMESPACE=demo-webui  TARGET_RESOURCE_KIND=v1/ConfigMap</text>
  <text x="78" y="752" fill="#6A6E73" font-size="11" font-family="monospace">TARGET_RESOURCE_NAME=app-config</text>
  <!-- Countdown button (50/50 width) -->
  <rect x="66" y="766" width="344" height="36" rx="8" fill="#0097A7"/>
  <text x="238" y="789" text-anchor="middle" fill="white" font-size="12" font-weight="600">Executing in 10s...</text>
  <!-- Progress bar inside execute button -->
  <rect x="66" y="798" width="344" height="4" rx="2" fill="rgba(0,0,0,0.1)"/>
  <rect x="66" y="798" width="230" height="4" rx="2" fill="rgba(255,255,255,0.5)"/>
  <rect x="420" y="766" width="336" height="36" rx="8" fill="white" stroke="#EBEBEB" stroke-width="1"/>
  <text x="588" y="789" text-anchor="middle" fill="#6A6E73" font-size="12" font-weight="500">Cancel</text>

  <!-- ===== WORKFLOW CARD 2: Not selected, normal state ===== -->
  <rect x="46" y="822" width="728" height="44" rx="12" fill="white" stroke="#EBEBEB" stroke-width="1" opacity="0.5"/>
  <circle cx="66" cy="844" r="8" fill="#DC2626"/>
  <line x1="62" y1="844" x2="70" y2="844" stroke="white" stroke-width="2"/>
  <text x="80" y="848" fill="#6A6E73" font-size="12" font-weight="700">patch-configuration-v1</text>
  <rect x="290" y="836" width="62" height="18" rx="9" fill="#FEF2F2"/>
  <text x="321" y="849" text-anchor="middle" fill="#DC2626" font-size="9" font-weight="600">Ruled out</text>
  <text x="370" y="848" fill="#A3A6A9" font-size="11">selfHeal:true will revert in-cluster patches</text>

  <!-- ===== INPUT BAR ===== -->
  <rect x="46" y="878" width="728" height="44" rx="22" fill="#F9FAFB" stroke="#EBEBEB" stroke-width="1"/>
  <text x="72" y="904" fill="#A3A6A9" font-size="12">Ask a follow-up or start a new investigation...</text>
  <circle cx="748" cy="900" r="16" fill="#0097A7"/>
  <path d="M748,893 L748,907 M742,899 L748,893 L754,899" stroke="white" stroke-width="2" fill="none"/>
</svg>
