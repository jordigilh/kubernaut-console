<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 820 1200" font-family="Red Hat Text, Red Hat Display, -apple-system, sans-serif">
  <defs>
    <filter id="cardShadow">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#000" flood-opacity="0.06"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="820" height="1200" fill="#F9FAFB"/>
  
  <!-- Container -->
  <rect x="30" y="16" width="760" height="1168" rx="16" fill="white" stroke="#EBEBEB" stroke-width="1" filter="url(#cardShadow)"/>

  <!-- ===== HEADER (teal gradient) ===== -->
  <rect x="30" y="16" width="760" height="56" rx="16" fill="#0097A7"/>
  <rect x="30" y="56" width="760" height="16" fill="#0097A7"/>
  <!-- Logo -->
  <circle cx="62" cy="44" r="14" fill="rgba(255,255,255,0.2)"/>
  <text x="62" y="49" text-anchor="middle" fill="white" font-size="12" font-weight="700">K</text>
  <text x="86" y="48" fill="white" font-size="14" font-weight="700" font-family="Red Hat Display, sans-serif">Kubernaut Console</text>
  <!-- Phase indicator -->
  <rect x="330" y="32" width="180" height="24" rx="12" fill="rgba(255,255,255,0.15)"/>
  <circle cx="348" cy="44" r="4" fill="#4ade80"/>
  <text x="360" y="48" fill="rgba(255,255,255,0.9)" font-size="11" font-weight="500">Executing remediation</text>
  <!-- Actions -->
  <text x="700" y="48" fill="rgba(255,255,255,0.7)" font-size="11">+ New</text>
  <circle cx="752" cy="44" r="12" fill="rgba(255,255,255,0.2)"/>
  <text x="752" y="48" text-anchor="middle" fill="white" font-size="10" font-weight="700">JG</text>

  <!-- ===== ALERT BANNER ===== -->
  <rect x="46" y="82" width="728" height="44" rx="8" fill="#FEF2F2" stroke="#FECACA" stroke-width="1"/>
  <circle cx="68" cy="104" r="8" fill="#EE0000"/>
  <text x="68" y="108" text-anchor="middle" fill="white" font-size="9" font-weight="700">!</text>
  <text x="84" y="99" fill="#7F1D1D" font-size="12" font-weight="600">KubePodCrashLooping</text>
  <text x="214" y="99" fill="#6A6E73" font-size="11">[critical]</text>
  <text x="84" y="116" fill="#991B1B" font-size="11">worker-79ffc8cd99-tbhgn in demo-checkout (4 restarts, CrashLoopBackOff)</text>

  <!-- ===== USER MESSAGE ===== -->
  <rect x="310" y="140" width="464" height="38" rx="16" fill="#E0F2FE"/>
  <text x="326" y="163" fill="#0C4A6E" font-size="12">What's happening with the worker pods in demo-checkout?</text>

  <!-- ===== THINKING PANEL (collapsed, completed) ===== -->
  <rect x="46" y="192" width="500" height="28" rx="6" fill="#F9FAFB" stroke="#EBEBEB" stroke-width="1"/>
  <polygon points="60,203 66,207 60,211" fill="#A3A6A9"/>
  <text x="74" y="210" fill="#6A6E73" font-size="11">Investigated in 4 steps</text>
  <text x="460" y="210" fill="#A3A6A9" font-size="10">12s</text>

  <!-- ===== RCA CARD (the artifact) ===== -->
  <rect x="46" y="232" width="620" height="158" rx="12" fill="white" stroke="#EBEBEB" stroke-width="1" filter="url(#cardShadow)"/>
  <!-- Left accent bar -->
  <rect x="46" y="232" width="5" height="158" rx="3" fill="#EE0000"/>
  <!-- Content -->
  <text x="66" y="258" fill="#151515" font-size="14" font-weight="700" font-family="Red Hat Display, sans-serif">Root Cause Analysis</text>
  <rect x="230" y="244" width="52" height="18" rx="9" fill="#FEF2F2"/>
  <text x="256" y="256" text-anchor="middle" fill="#EE0000" font-size="9" font-weight="600">critical</text>
  <!-- Causal chain only (no duplicate summary) -->
  <text x="66" y="284" fill="#292929" font-size="11">Container command was overridden via kubectl-patch at 12:53 UTC</text>
  <text x="66" y="302" fill="#292929" font-size="11">to inject a fatal exit script referencing 'bad release 1.1.0'.</text>
  <line x1="66" y1="316" x2="650" y2="316" stroke="#EBEBEB" stroke-width="1"/>
  <text x="66" y="336" fill="#6A6E73" font-size="10" font-weight="500">Causal chain:</text>
  <text x="78" y="354" fill="#6A6E73" font-size="10">1. Deployment patched with fatal command override</text>
  <text x="78" y="370" fill="#6A6E73" font-size="10">2. New ReplicaSet pods exit immediately (code 1)</text>
  <text x="78" y="386" fill="#6A6E73" font-size="10">3. Rolling update stuck, 2 healthy old pods remain</text>

  <!-- ===== AGENT CTA (directly present workflows, no intermediate buttons) ===== -->
  <rect x="46" y="402" width="620" height="32" rx="8" fill="#F0FDFA"/>
  <text x="62" y="422" fill="#0097A7" font-size="11" font-weight="500">I recommend rolling back. Select a workflow to execute, or type to investigate further.</text>

  <!-- ===== WORKFLOW CARDS (human-readable titles, visual confidence) ===== -->

  <!-- Card 1: Recommended -->
  <rect x="46" y="448" width="352" height="130" rx="12" fill="white" stroke="#0097A7" stroke-width="2" filter="url(#cardShadow)"/>
  <!-- Confidence indicator (green circle) -->
  <circle cx="66" cy="472" r="8" fill="#16A34A"/>
  <path d="M63,472 L65,474 L69,470" stroke="white" stroke-width="1.5" fill="none"/>
  <text x="80" y="476" fill="#151515" font-size="13" font-weight="700" font-family="Red Hat Display, sans-serif">Roll Back Deployment</text>
  <!-- Recommended badge -->
  <rect x="250" y="464" width="82" height="18" rx="9" fill="#F0FDFA" stroke="#0097A7" stroke-width="0.5"/>
  <text x="291" y="477" text-anchor="middle" fill="#0097A7" font-size="9" font-weight="600">Recommended</text>
  <!-- Description (from spec.description.what) -->
  <text x="66" y="498" fill="#292929" font-size="11">Reverts the entire pod template to the last</text>
  <text x="66" y="514" fill="#292929" font-size="11">known-good revision. Purpose-built for</text>
  <text x="66" y="530" fill="#292929" font-size="11">CrashLoopBackOff caused by spec changes.</text>
  <!-- Rationale -->
  <text x="66" y="552" fill="#6A6E73" font-size="9" font-style="italic">Matches: bad spec patch causing exit code 1</text>
  <!-- Fine print -->
  <text x="66" y="570" fill="#A3A6A9" font-size="9">crashloop-rollback-v1</text>

  <!-- Card 2 -->
  <rect x="412" y="448" width="352" height="130" rx="12" fill="white" stroke="#EBEBEB" stroke-width="1" filter="url(#cardShadow)"/>
  <!-- Confidence indicator (yellow/amber) -->
  <circle cx="432" cy="472" r="8" fill="#F59E0B"/>
  <text x="432" y="476" text-anchor="middle" fill="white" font-size="8" font-weight="700">2</text>
  <text x="446" y="476" fill="#151515" font-size="13" font-weight="700" font-family="Red Hat Display, sans-serif">General Rollback</text>
  <!-- Description -->
  <text x="432" y="498" fill="#292929" font-size="11">General-purpose rollback for stuck rollouts</text>
  <text x="432" y="514" fill="#292929" font-size="11">and bad spec changes. Valid fallback,</text>
  <text x="432" y="530" fill="#292929" font-size="11">less targeted to CrashLoopBackOff.</text>
  <!-- Rationale -->
  <text x="432" y="552" fill="#6A6E73" font-size="9" font-style="italic">Less specific than crashloop-rollback-v1</text>
  <!-- Fine print -->
  <text x="432" y="570" fill="#A3A6A9" font-size="9">rollback-deployment-v1</text>

  <!-- ===== CONFIRMATION STEP (after user clicks recommended card) ===== -->
  <rect x="46" y="594" width="620" height="112" rx="12" fill="white" stroke="#0097A7" stroke-width="1" filter="url(#cardShadow)"/>
  <text x="66" y="618" fill="#151515" font-size="12" font-weight="700" font-family="Red Hat Display, sans-serif">Confirm Execution</text>
  <text x="66" y="640" fill="#292929" font-size="11">This will roll back Deployment/worker to its previous revision.</text>
  <!-- Parameters -->
  <rect x="66" y="652" width="420" height="20" rx="4" fill="#F9FAFB"/>
  <text x="78" y="666" fill="#6A6E73" font-size="9" font-family="monospace">TARGET_RESOURCE_NAME=worker  NAMESPACE=demo-checkout</text>
  <!-- Buttons -->
  <rect x="66" y="680" width="80" height="28" rx="6" fill="#0097A7"/>
  <text x="106" y="698" text-anchor="middle" fill="white" font-size="11" font-weight="600">Execute</text>
  <rect x="158" y="680" width="70" height="28" rx="6" fill="white" stroke="#EBEBEB" stroke-width="1"/>
  <text x="193" y="698" text-anchor="middle" fill="#6A6E73" font-size="11">Cancel</text>

  <!-- ===== EXECUTION PROGRESS ===== -->
  <rect x="46" y="722" width="620" height="164" rx="12" fill="#F0FDF4" stroke="#BBF7D0" stroke-width="1"/>
  <!-- Left accent bar -->
  <rect x="46" y="722" width="5" height="164" rx="3" fill="#16A34A"/>
  <text x="66" y="748" fill="#166534" font-size="12" font-weight="700" font-family="Red Hat Display, sans-serif">Executing: Roll Back Deployment</text>
  <text x="66" y="764" fill="#6A6E73" font-size="10">Target: Deployment/worker in demo-checkout</text>
  <!-- Steps -->
  <circle cx="78" cy="790" r="6" fill="#16A34A"/>
  <path d="M75,790 L77,792 L81,788" stroke="white" stroke-width="1.2" fill="none"/>
  <text x="92" y="794" fill="#166534" font-size="11">Resolving previous healthy revision (worker-5ccfd4c787)</text>
  <circle cx="78" cy="814" r="6" fill="#16A34A"/>
  <path d="M75,814 L77,816 L81,812" stroke="white" stroke-width="1.2" fill="none"/>
  <text x="92" y="818" fill="#166534" font-size="11">Rolling back Deployment/worker to revision 2</text>
  <circle cx="78" cy="838" r="6" fill="none" stroke="#0097A7" stroke-width="2"/>
  <circle cx="78" cy="838" r="2.5" fill="#0097A7"/>
  <text x="92" y="842" fill="#151515" font-size="11" font-weight="500">Waiting for rollout to complete...</text>
  <circle cx="78" cy="862" r="6" fill="none" stroke="#D1D5DB" stroke-width="1"/>
  <text x="92" y="866" fill="#A3A6A9" font-size="11">Verify pod health checks pass</text>
  <!-- Abort button -->
  <rect x="560" y="860" width="90" height="24" rx="6" fill="white" stroke="#FECACA" stroke-width="1"/>
  <text x="605" y="876" text-anchor="middle" fill="#EE0000" font-size="10">Cancel exec</text>

  <!-- ===== POST-EXECUTION SUCCESS (shows what it looks like when done) ===== -->
  <rect x="46" y="902" width="620" height="100" rx="12" fill="#F0FDF4" stroke="#16A34A" stroke-width="1"/>
  <rect x="46" y="902" width="5" height="100" rx="3" fill="#16A34A"/>
  <circle cx="66" cy="928" r="10" fill="#16A34A"/>
  <path d="M62,928 L65,931 L71,925" stroke="white" stroke-width="2" fill="none"/>
  <text x="82" y="932" fill="#166534" font-size="13" font-weight="700" font-family="Red Hat Display, sans-serif">Remediation Successful</text>
  <text x="66" y="954" fill="#292929" font-size="11">Deployment/worker rolled back to revision 2. All 3 pods are Running and passing</text>
  <text x="66" y="970" fill="#292929" font-size="11">health checks. CrashLoopBackOff resolved.</text>
  <!-- Audit link -->
  <text x="66" y="992" fill="#0066CC" font-size="10" text-decoration="underline">View RemediationRequest rr-d835a1f68ee8</text>

  <!-- ===== INPUT BAR ===== -->
  <rect x="46" y="1018" width="728" height="44" rx="22" fill="#F9FAFB" stroke="#EBEBEB" stroke-width="1"/>
  <text x="72" y="1044" fill="#A3A6A9" font-size="12">Ask a follow-up or type a new question...</text>
  <!-- Send button -->
  <circle cx="748" cy="1040" r="16" fill="#0097A7"/>
  <path d="M748,1033 L748,1047 M742,1039 L748,1033 L754,1039" stroke="white" stroke-width="2" fill="none"/>

  <!-- ===== FOOTER ===== -->
  <text x="410" y="1082" text-anchor="middle" fill="#A3A6A9" font-size="10">Sign out | Powered by Kubernaut A2A</text>

  <!-- ===== ANNOTATIONS (design notes) ===== -->
  <rect x="46" y="1100" width="728" height="80" rx="8" fill="#FFFBEB" stroke="#FDE68A" stroke-width="1"/>
  <text x="62" y="1120" fill="#92400E" font-size="10" font-weight="600">Design Notes</text>
  <text x="62" y="1136" fill="#92400E" font-size="9">1. Phase indicator in header shows current state (Investigating / RCA / Decision / Executing / Complete)</text>
  <text x="62" y="1150" fill="#92400E" font-size="9">2. No intermediate buttons - workflows presented directly after RCA with inline CTA</text>
  <text x="62" y="1164" fill="#92400E" font-size="9">3. Confirmation step shows parameters before execution. Abort available during execution.</text>
  <text x="62" y="1178" fill="#92400E" font-size="9">4. Human-readable titles (from spec.description.what), workflow ID as fine print for audit trail</text>
</svg>
